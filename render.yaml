services:
  - type: web
    name: warehouse-api
    env: node
    plan: starter
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_URL
        sync: false
